<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spodkast</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 760px;
    }

    h1 { font-size: 1.4rem; font-weight: 600; color: #fff; }
    h2 { font-size: 1rem; font-weight: 600; color: #fff; }

    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .session-badge { font-size: 0.75rem; color: #555; font-family: monospace; }

    .session-title-input {
      width: 100%; background: transparent; border: none; border-bottom: 1px solid #2a2a2a;
      color: #ccc; font-size: 1rem; font-weight: 500; padding: 0.2rem 0; outline: none;
      transition: border-color 0.15s; margin-bottom: 1rem;
    }
    .session-title-input:focus { border-bottom-color: #555; color: #fff; }
    .session-title-input::placeholder { color: #444; font-weight: 400; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: #111; border-radius: 8px; padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 0.5rem; border: none; background: transparent; color: #888; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.15s, color 0.15s; }
    .tab.active { background: #2a2a2a; color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }

    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.4rem; }
    textarea, input[type="text"], select {
      width: 100%; background: #111; border: 1px solid #2a2a2a; border-radius: 8px;
      color: #e8e8e8; padding: 0.7rem 0.9rem; font-size: 0.9rem; outline: none;
      transition: border-color 0.15s; font-family: inherit;
    }
    textarea:focus, input[type="text"]:focus, select:focus { border-color: #555; }
    textarea { resize: vertical; min-height: 160px; }

    .drop-zone {
      border: 2px dashed #2a2a2a; border-radius: 8px; padding: 2.5rem;
      text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
      color: #666; font-size: 0.9rem;
    }
    .drop-zone.hover, .drop-zone:hover { border-color: #555; background: #1f1f1f; }
    .drop-zone.has-file { border-color: #4a7c59; color: #7ec99a; }
    .drop-zone input[type="file"] { display: none; }

    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.2rem; }
    .options .full { grid-column: 1 / -1; }
    .checkbox-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #aaa; cursor: pointer; }
    .checkbox-row input[type="checkbox"] { accent-color: #7ec99a; cursor: pointer; }

    /* Buttons */
    .btn {
      padding: 0.7rem 1.2rem; border: none; border-radius: 8px; font-size: 0.9rem;
      font-weight: 500; cursor: pointer; transition: background 0.15s, opacity 0.15s;
      text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary   { background: #2e5c3e; color: #fff; justify-content: center; }
    .btn-primary:hover:not(:disabled)   { background: #3a7050; }
    .btn-secondary { background: #222; color: #bbb; border: 1px solid #333; }
    .btn-secondary:hover:not(:disabled) { background: #2a2a2a; }
    .btn-danger    { background: #3a1a1a; color: #e87a7a; border: 1px solid #5a2a2a; }
    .btn-danger:hover:not(:disabled)    { background: #4a2020; }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; border-radius: 6px; }
    .btn-generate  { background: #1e3a28; color: #7ec99a; border: 1px solid #2e5c3e; font-size: 0.8rem; padding: 0.35rem 0.75rem; border-radius: 6px; }
    .btn-generate:hover:not(:disabled)  { background: #254d33; }
    .btn-download  { background: #1a3a2a; color: #7ec99a; border: 1px solid #2e5c3e; font-size: 0.8rem; padding: 0.35rem 0.75rem; border-radius: 6px; text-decoration: none; }
    .btn-retry     { background: #2a1a1a; color: #e87a7a; border: 1px solid #5a2a2a; font-size: 0.8rem; padding: 0.35rem 0.75rem; border-radius: 6px; }
    .btn-retry:hover:not(:disabled)     { background: #3a2020; }
    .btn-translate { background: #1a2a3a; color: #7ab8e8; border: 1px solid #2a4a6a; font-size: 0.8rem; padding: 0.35rem 0.75rem; border-radius: 6px; }
    .btn-translate:hover:not(:disabled) { background: #223344; }

    /* Status */
    .status { padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.85rem; display: none; }
    .status.info  { background: #1a2a3a; color: #7ab8e8; display: block; }
    .status.error { background: #2a1a1a; color: #e87a7a; display: block; }

    .operator-msg {
      padding: 0.8rem 1rem; background: #2a2a1a; border-left: 3px solid #c9a84c;
      border-radius: 0 8px 8px 0; font-size: 0.82rem; color: #c9a84c; margin-bottom: 1rem;
    }

    /* Language bar */
    .lang-bar { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
    .lang-pill {
      padding: 0.3rem 0.8rem; border: 1px solid #333; border-radius: 20px;
      font-size: 0.78rem; background: #111; color: #777; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .lang-pill.active { background: #1e3a28; color: #7ec99a; border-color: #2e5c3e; }
    .lang-pill:hover:not(.active):not(.lang-add) { border-color: #555; color: #ccc; }
    .lang-pill.lang-add { color: #555; border-style: dashed; }
    .lang-pill.lang-add:hover { color: #888; border-color: #555; }
    .lang-add-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }

    /* Synthesis settings */
    .synth-settings {
      background: #111; border: 1px solid #222; border-radius: 8px; padding: 1rem;
      margin-bottom: 1rem;
    }
    .synth-section-title { font-size: 0.72rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.6rem; }
    .synth-settings .options { margin-top: 0; }

    /* Range sliders */
    .voice-controls { margin-top: 0.75rem; }
    .slider-grid { display: grid; grid-template-columns: 90px 1fr 38px; gap: 0.4rem 0.75rem; align-items: center; }
    .slider-label { font-size: 0.78rem; color: #777; }
    input[type="range"] { width: 100%; accent-color: #7ec99a; cursor: pointer; }
    .slider-val { font-size: 0.75rem; color: #7ec99a; font-family: monospace; text-align: right; }

    /* History */
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      background: #111; border: 1px solid #222; border-radius: 6px; padding: 0.5rem 0.8rem;
      font-size: 0.8rem; cursor: pointer; transition: border-color 0.15s;
    }
    .history-item:hover { border-color: #444; }
    .history-item .hi-id { color: #7ab8e8; font-family: monospace; }
    .history-item .hi-meta { color: #555; }

    /* Review */
    #review { display: none; }
    .review-toolbar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
    .review-toolbar h2 { flex: 1; }

    .episode-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .episode-card { background: #111; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1rem; }
    .episode-card.loading { border-color: #1e3a28; }
    .episode-card.error-state { border-color: #5a2a2a; }

    .episode-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.5rem; gap: 0.5rem; }
    .episode-title  { font-weight: 600; font-size: 0.9rem; color: #fff; }
    .episode-meta   { font-size: 0.75rem; color: #555; white-space: nowrap; }
    .episode-summary { font-size: 0.78rem; color: #555; font-style: italic; margin-bottom: 0.6rem; }

    .script-area {
      width: 100%; background: #0d0d0d; border: 1px solid #222; border-radius: 6px;
      color: #bbb; padding: 0.7rem; font-size: 0.82rem; font-family: inherit;
      line-height: 1.6; resize: vertical; min-height: 7em; max-height: 60vh;
      overflow-y: auto; transition: border-color 0.15s; margin-bottom: 0.75rem; display: none;
    }
    .script-area.streaming { min-height: 7em; color: #9ab; border-color: #1e3a28; }
    .script-area.expanded  { min-height: 20em; }
    .script-area:focus { border-color: #555; }

    .episode-actions { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .actions-left  { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; flex: 1; }
    .actions-right { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #2e5c3e; border-top-color: #7ec99a; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .generate-all-row { margin-top: 1.25rem; display: flex; gap: 0.75rem; align-items: center; }
    .save-indicator { font-size: 0.72rem; color: #3a5a3a; display: none; }
    .save-indicator.visible { display: inline; }

    .job-badge { font-size: 0.72rem; color: #777; font-family: monospace; }
    .job-badge.running { color: #7ab8e8; }
    .job-badge.done    { color: #7ec99a; }
    .job-badge.failed  { color: #e87a7a; }
  </style>
</head>
<body>
<div class="card">

  <!-- ── Input ── -->
  <div id="input-step">
    <div class="header"><h1>Spodkast</h1></div>

    <div class="tabs">
      <button class="tab active" data-tab="text">Text</button>
      <button class="tab" data-tab="url">URL</button>
      <button class="tab" data-tab="file">File</button>
    </div>

    <div class="panel active" id="panel-text">
      <label for="text-input">Source material</label>
      <textarea id="text-input" placeholder="Paste your article, notes, or any text here…"></textarea>
    </div>
    <div class="panel" id="panel-url">
      <label for="url-input">URL</label>
      <input type="text" id="url-input" placeholder="https://example.com/article">
    </div>
    <div class="panel" id="panel-file">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".txt,.md,.rst,.csv">
        Drop a text file here, or <u>click to browse</u>
      </div>
    </div>

    <div style="display:flex; gap:0.6rem; margin-top:1.5rem;">
      <button class="btn btn-primary" id="submit-btn" style="flex:1">Generate scripts</button>
    </div>
    <div class="status" id="input-status"></div>

    <div id="history-section" style="margin-top:1.5rem; display:none">
      <div style="font-size:0.8rem; color:#555; margin-bottom:0.6rem;">Previous sessions</div>
      <div id="history-list" style="display:flex; flex-direction:column; gap:0.4rem;"></div>
    </div>
  </div>

  <!-- ── Review ── -->
  <div id="review">
    <div class="header">
      <h1>Spodkast</h1>
      <span class="session-badge" id="session-badge"></span>
    </div>
    <input class="session-title-input" id="session-title" placeholder="Untitled session" autocomplete="off">

    <div id="operator-msg-box" class="operator-msg" style="display:none"></div>

    <div class="review-toolbar">
      <h2 id="episodes-heading">Generating episode plan…</h2>
      <button class="btn btn-danger btn-sm" id="cancel-expand-btn" style="display:none">Cancel</button>
      <button class="btn btn-secondary btn-sm" id="new-session-btn">← New</button>
    </div>

    <!-- Language bar -->
    <div class="lang-bar" id="lang-bar" style="display:none"></div>

    <!-- Synthesis settings -->
    <div class="synth-settings" id="synth-settings" style="display:none">
      <div class="synth-section-title">Voice</div>
      <div class="options" style="margin-top:0">
        <div>
          <label for="synth-voice">Voice</label>
          <select id="synth-voice">
            <option value="">Default (Nicole — whisper)</option>
            <option value="piTKgcLEGmPE4e6mEKli">Nicole — whisper / ASMR</option>
            <option value="oWAxZDx7w5VEj9dCyTzz">Grace — calm, gentle</option>
            <option value="XrExE9yKIg1WjnnlVkGX">Matilda — warm, soft</option>
            <option value="pMsXgVXv3BLzUgSXRplE">Serena — serene, steady</option>
            <option value="LcfcDJNUP1GQjkzn1xUU">Emily — soft, clear</option>
            <option value="ThT5KcBeYPX3keUQqHPh">Dorothy — warm storyteller</option>
            <option value="EXAVITQu4vr4xnSDxMaL">Sarah — gentle, expressive</option>
          </select>
        </div>
        <div class="full" style="display:flex; gap:1.5rem; align-items:center; padding-top:0.3rem;">
          <label class="checkbox-row"><input type="checkbox" id="synth-intro"> Include intro</label>
          <label class="checkbox-row"><input type="checkbox" id="synth-outro"> Include outro</label>
        </div>
      </div>

      <div class="voice-controls">
        <div class="synth-section-title" style="margin-top:0.75rem;">Voice controls</div>
        <div class="slider-grid">
          <span class="slider-label">Speed</span>
          <input type="range" id="synth-speed" min="0.7" max="1.3" step="0.05" value="1.0">
          <span class="slider-val" id="synth-speed-val">1.00</span>

          <span class="slider-label">Stability</span>
          <input type="range" id="synth-stability" min="0" max="1" step="0.05" value="0.80">
          <span class="slider-val" id="synth-stability-val">0.80</span>

          <span class="slider-label">Similarity</span>
          <input type="range" id="synth-similarity" min="0" max="1" step="0.05" value="0.75">
          <span class="slider-val" id="synth-similarity-val">0.75</span>

          <span class="slider-label">Style</span>
          <input type="range" id="synth-style" min="0" max="1" step="0.05" value="0.10">
          <span class="slider-val" id="synth-style-val">0.10</span>
        </div>
        <label class="checkbox-row" style="margin-top:0.6rem;">
          <input type="checkbox" id="synth-speaker-boost"> Speaker boost
        </label>
      </div>
    </div>

    <div class="episode-list" id="episode-list"></div>

    <div class="generate-all-row" id="generate-all-row" style="display:none">
      <button class="btn btn-primary" id="generate-all-btn" style="flex:1; margin-top:0">Generate all episodes</button>
    </div>

    <div class="status" id="review-status" style="margin-top:1rem"></div>
  </div>
</div>

<script>
  // ── Tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Drop zone ──
  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  let selectedFile = null;
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('hover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('hover'); setFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => setFile(fileInput.files[0]));
  function setFile(f) {
    selectedFile = f;
    dropZone.classList.toggle('has-file', !!f);
    dropZone.textContent = f ? `✓ ${f.name}` : 'Drop a text file here, or click to browse';
  }

  // ── Slider values ──
  ['speed', 'stability', 'similarity', 'style'].forEach(id => {
    const el  = document.getElementById(`synth-${id}`);
    const val = document.getElementById(`synth-${id}-val`);
    if (el && val) el.addEventListener('input', () => { val.textContent = parseFloat(el.value).toFixed(2); });
  });

  // ── Voice dropdown persistence ──
  document.getElementById('synth-voice').addEventListener('change', function () {
    const voiceId = this.value;
    // Save globally so the preference survives new sessions
    saveGlobalVoicePref(voiceId);
    // Also save per-session if we're currently in one
    if (currentSession) {
      saveSessionVoicePref(currentSession.session_id, voiceId);
    }
  });

  // ── Language config ──
  const LANG_NAMES = { en: 'EN', pl: 'PL', es: 'ES', de: 'DE', fr: 'FR', it: 'IT', pt: 'PT', ja: 'JA', zh: 'ZH' };
  const LANG_FULL  = { en: 'English', pl: 'Polish', es: 'Spanish', de: 'German', fr: 'French', it: 'Italian', pt: 'Portuguese', ja: 'Japanese', zh: 'Chinese' };
  const TRANSLATABLE_LANGS = ['pl', 'es', 'de', 'fr', 'it', 'pt', 'ja', 'zh'];

  // ── Session persistence ──
  const SESSIONS_KEY = 'spodkast_sessions';
  const VOICE_PREF_KEY = 'spodkast_voice_pref';

  function loadSavedSessions() {
    try { return JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'); } catch { return []; }
  }
  function saveSession(data) {
    const existing = loadSavedSessions().find(s => s.session_id === data.session_id);
    const all = loadSavedSessions().filter(s => s.session_id !== data.session_id);
    const entry = { ...data, saved_at: existing?.saved_at ?? new Date().toISOString() };
    if (existing?.episode_texts) entry.episode_texts = existing.episode_texts;
    if (existing?.title)         entry.title = existing.title;
    if (existing?.voice_id !== undefined) entry.voice_id = existing.voice_id;
    all.unshift(entry);
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(all));
  }

  // ── Voice preference helpers ──
  // Global preference persists across sessions; per-session preference overrides it.
  function loadGlobalVoicePref() {
    return localStorage.getItem(VOICE_PREF_KEY) ?? '';
  }
  function saveGlobalVoicePref(voiceId) {
    localStorage.setItem(VOICE_PREF_KEY, voiceId);
  }
  function loadSessionVoicePref(session_id) {
    const s = loadSavedSessions().find(s => s.session_id === session_id);
    return s?.voice_id ?? null;
  }
  function saveSessionVoicePref(session_id, voiceId) {
    const all = loadSavedSessions().map(s =>
      s.session_id === session_id ? { ...s, voice_id: voiceId } : s
    );
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(all));
  }
  // Apply the correct voice to the dropdown, preferring session-level, then global, then default.
  function applyVoicePref(session_id) {
    const voiceEl = document.getElementById('synth-voice');
    if (!voiceEl) return;
    const sessionPref = session_id ? loadSessionVoicePref(session_id) : null;
    const voiceId = sessionPref !== null ? sessionPref : loadGlobalVoicePref();
    voiceEl.value = voiceId;
    // Fallback: if the saved value isn't a valid option, reset to default
    if (voiceEl.value !== voiceId) voiceEl.value = '';
  }

  // episode_texts structure: { [episode_index]: { en: "...", pl: "...", ... } }
  // Migration: old format was { [episode_index]: "string" } → treated as { en: "string" }
  function getEpisodeTexts(session_id, index) {
    const s = loadSavedSessions().find(s => s.session_id === session_id);
    if (!s?.episode_texts) return {};
    const val = s.episode_texts[index];
    if (!val) return {};
    if (typeof val === 'string') return { en: val }; // legacy
    return val;
  }
  function getEpisodeTextLang(session_id, index, lang) {
    return getEpisodeTexts(session_id, index)[lang] ?? null;
  }
  function saveEpisodeTextLang(session_id, index, lang, text) {
    const all = loadSavedSessions().map(s => {
      if (s.session_id !== session_id) return s;
      const episode_texts = { ...(s.episode_texts || {}) };
      const existing = episode_texts[index] || {};
      if (typeof existing === 'string') {
        episode_texts[index] = { en: existing, [lang]: text };
      } else {
        episode_texts[index] = { ...existing, [lang]: text };
      }
      return { ...s, episode_texts };
    });
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(all));
  }
  // Convenience wrappers for English (expansion)
  function saveEpisodeTextLocal(session_id, index, text) { saveEpisodeTextLang(session_id, index, 'en', text); }
  function loadEpisodeTextLocal(session_id, index) { return getEpisodeTextLang(session_id, index, 'en'); }

  // ── State ──
  let currentSession = null;
  let _activeLanguage = 'en';
  let _conspectController = null;
  let _expandCancelled = false;
  let _generateAllCancelled = false;

  function setInputStatus(msg, type) {
    const el = document.getElementById('input-status');
    el.textContent = msg; el.className = 'status ' + (type || '');
  }
  function setReviewStatus(msg, type) {
    const el = document.getElementById('review-status');
    el.textContent = msg; el.className = 'status ' + (type || '');
  }

  function getSynthesisParams(textOverride) {
    const p = {
      language: _activeLanguage,
      voice_id: document.getElementById('synth-voice').value || undefined,
      include_intro: document.getElementById('synth-intro').checked,
      include_outro: document.getElementById('synth-outro').checked,
      speed:            parseFloat(document.getElementById('synth-speed').value),
      stability:        parseFloat(document.getElementById('synth-stability').value),
      similarity_boost: parseFloat(document.getElementById('synth-similarity').value),
      style:            parseFloat(document.getElementById('synth-style').value),
      use_speaker_boost: document.getElementById('synth-speaker-boost').checked,
    };
    if (textOverride) p.text_override = textOverride;
    return p;
  }

  // ── Language bar ──
  function updateLangBar() {
    const bar = document.getElementById('lang-bar');
    if (!bar || !currentSession) return;
    bar.style.display = 'flex';
    bar.innerHTML = '';

    // Collect all languages with any data
    const allLangs = new Set(['en']);
    currentSession.episodes.forEach(ep => {
      Object.keys(getEpisodeTexts(currentSession.session_id, ep.index)).forEach(l => allLangs.add(l));
    });

    allLangs.forEach(lang => {
      const count = currentSession.episodes.filter(ep =>
        getEpisodeTextLang(currentSession.session_id, ep.index, lang)
      ).length;
      const pill = document.createElement('button');
      pill.className = 'lang-pill' + (lang === _activeLanguage ? ' active' : '');
      pill.textContent = `${LANG_NAMES[lang] || lang.toUpperCase()} ${count}/${currentSession.episode_count}`;
      pill.onclick = () => switchLanguage(lang);
      bar.appendChild(pill);
    });

    // Add language button
    const addBtn = document.createElement('button');
    addBtn.className = 'lang-pill lang-add';
    addBtn.id = 'lang-add-btn';
    addBtn.textContent = '+ Add language';
    addBtn.onclick = showAddLanguageUI;
    bar.appendChild(addBtn);
  }

  function showAddLanguageUI() {
    const bar = document.getElementById('lang-bar');
    const addBtn = document.getElementById('lang-add-btn');
    if (!addBtn) return;

    const row = document.createElement('div');
    row.className = 'lang-add-row';
    row.innerHTML = `
      <select id="lang-add-select" style="padding:0.3rem 0.6rem; font-size:0.8rem; width:auto;">
        ${TRANSLATABLE_LANGS.map(l => `<option value="${l}">${LANG_FULL[l]}</option>`).join('')}
      </select>
      <button class="btn btn-translate btn-sm" id="lang-add-go">Translate all</button>
      <button class="btn btn-secondary btn-sm" id="lang-add-cancel">✕</button>
    `;
    addBtn.replaceWith(row);
    document.getElementById('lang-add-cancel').onclick = updateLangBar;
    document.getElementById('lang-add-go').onclick = () => {
      const lang = document.getElementById('lang-add-select').value;
      updateLangBar();
      translateAllToLanguage(lang);
    };
  }

  function switchLanguage(lang) {
    _activeLanguage = lang;
    if (currentSession) {
      currentSession.episodes.forEach(ep => refreshEpisodeForLanguage(currentSession.session_id, ep.index, lang));
    }
    updateLangBar();
  }

  function refreshEpisodeForLanguage(session_id, index, lang) {
    const scriptEl  = document.getElementById(`script-${index}`);
    const metaEl    = document.getElementById(`meta-${index}`);
    const actionsEl = document.getElementById(`actions-${index}`);
    if (!scriptEl || !actionsEl) return;

    const text = getEpisodeTextLang(session_id, index, lang);
    if (text) {
      scriptEl.value = text;
      scriptEl.readOnly = false;
      scriptEl.classList.add('expanded');
      scriptEl.classList.remove('streaming');
      scriptEl.style.display = 'block';
      if (metaEl) metaEl.textContent = text.trim().split(/\s+/).length.toLocaleString() + ' words';
      setEpisodeReady(index, session_id);
    } else {
      scriptEl.value = '';
      scriptEl.placeholder = `Not yet translated to ${LANG_NAMES[lang] || lang.toUpperCase()}`;
      scriptEl.readOnly = true;
      scriptEl.classList.remove('expanded');
      scriptEl.style.display = 'block';
      if (metaEl) metaEl.textContent = '';
      actionsEl.querySelector('.actions-left').innerHTML = `
        <button class="btn btn-translate btn-sm"
          onclick="translateEpisodeTo('${session_id}', ${index}, '${lang}')">
          Translate to ${LANG_NAMES[lang] || lang.toUpperCase()}
        </button>
      `;
    }
  }

  // ── Translate all episodes to a language ──
  async function translateAllToLanguage(lang) {
    _activeLanguage = lang;
    updateLangBar();
    _expandCancelled = false;
    document.getElementById('cancel-expand-btn').style.display = '';

    for (const ep of currentSession.episodes) {
      if (_expandCancelled) break;
      const enText = getEpisodeTextLang(currentSession.session_id, ep.index, 'en');
      if (!enText) continue;
      if (getEpisodeTextLang(currentSession.session_id, ep.index, lang)) continue; // already done
      await streamTranslate(currentSession.session_id, ep.index, lang, enText);
    }

    document.getElementById('cancel-expand-btn').style.display = 'none';
    updateLangBar();
    setReviewStatus('', '');
  }

  // ── Translate a single episode to a language ──
  async function translateEpisodeTo(session_id, index, lang) {
    const enText = getEpisodeTextLang(session_id, index, 'en');
    if (!enText) {
      setReviewStatus('No English text available for this episode.', 'error');
      return;
    }
    await streamTranslate(session_id, index, lang, enText);
    updateLangBar();
  }

  async function streamTranslate(session_id, index, lang, sourceText) {
    const scriptEl  = document.getElementById(`script-${index}`);
    const metaEl    = document.getElementById(`meta-${index}`);
    const actionsEl = document.getElementById(`actions-${index}`);
    if (!scriptEl) return;

    scriptEl.style.display = 'block';
    scriptEl.classList.add('streaming');
    scriptEl.value = '';
    scriptEl.readOnly = true;
    if (actionsEl) {
      actionsEl.querySelector('.actions-left').innerHTML =
        `<span style="font-size:0.78rem; color:#7ab8e8"><span class="spinner"></span> Translating to ${LANG_NAMES[lang] || lang.toUpperCase()}…</span>`;
    }

    let text = '';
    try {
      const resp = await fetch(`/podcast/sessions/${session_id}/episodes/${index}/translate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ target_language: lang, source_text: sourceText }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        if (actionsEl) actionsEl.querySelector('.actions-left').innerHTML =
          `<span style="color:#e87a7a; font-size:0.78rem">${escHtml(err.detail ?? resp.statusText)}</span>
           <button class="btn btn-retry btn-sm" onclick="translateEpisodeTo('${session_id}', ${index}, '${lang}')">Retry</button>`;
        return;
      }
      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        text += decoder.decode(value, { stream: true });
        scriptEl.value = text;
        scriptEl.scrollTop = scriptEl.scrollHeight;
      }
      saveEpisodeTextLang(session_id, index, lang, text);
      scriptEl.classList.remove('streaming');
      scriptEl.classList.add('expanded');
      scriptEl.readOnly = false;
      if (metaEl) metaEl.textContent = text.trim().split(/\s+/).length.toLocaleString() + ' words';
      setEpisodeReady(index, session_id);
      wireEditAutoSave(session_id, index, lang, scriptEl);
    } catch (e) {
      if (actionsEl) actionsEl.querySelector('.actions-left').innerHTML =
        `<span style="color:#e87a7a; font-size:0.78rem">${escHtml(e.message)}</span>
         <button class="btn btn-retry btn-sm" onclick="translateEpisodeTo('${session_id}', ${index}, '${lang}')">Retry</button>`;
    }
  }

  // ── Submit ──
  document.getElementById('submit-btn').addEventListener('click', async () => {
    const activeTab = document.querySelector('.tab.active').dataset.tab;
    let source;
    if (activeTab === 'file') {
      if (!selectedFile) { setInputStatus('Please select a file.', 'error'); return; }
      source = await selectedFile.text();
    } else if (activeTab === 'url') {
      source = document.getElementById('url-input').value.trim();
    } else {
      source = document.getElementById('text-input').value.trim();
    }
    if (!source) { setInputStatus('Please provide source material.', 'error'); return; }

    showReviewLoading();
    _conspectController = new AbortController();
    document.getElementById('cancel-expand-btn').style.display = '';

    try {
      const resp = await fetch('/podcast/scripts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ source }),
        signal: _conspectController.signal,
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        setReviewStatus('Error: ' + (err.detail ?? resp.statusText), 'error');
        document.getElementById('cancel-expand-btn').style.display = 'none';
        return;
      }
      const data = await resp.json();
      currentSession = data;
      _activeLanguage = 'en';
      saveSession(data);
      populateConspect(data);
      _expandCancelled = false;
      await expandAllSequentially(data.session_id, data.episodes);
    } catch (e) {
      if (e.name === 'AbortError') setReviewStatus('Cancelled.', '');
      else setReviewStatus('Network error: ' + e.message, 'error');
    } finally {
      _conspectController = null;
      document.getElementById('cancel-expand-btn').style.display = 'none';
    }
  });

  document.getElementById('cancel-expand-btn').addEventListener('click', () => {
    _expandCancelled = true;
    _generateAllCancelled = true;
    if (_conspectController) { _conspectController.abort(); _conspectController = null; }
    document.getElementById('cancel-expand-btn').style.display = 'none';
    setReviewStatus('Cancelled.', '');
  });

  function showReviewLoading() {
    _activeLanguage = 'en';
    document.getElementById('input-step').style.display = 'none';
    document.getElementById('review').style.display = 'block';
    document.getElementById('session-badge').textContent = '';
    document.getElementById('session-title').value = '';
    document.getElementById('episodes-heading').textContent = 'Generating episode plan…';
    document.getElementById('operator-msg-box').style.display = 'none';
    document.getElementById('episode-list').innerHTML = '';
    document.getElementById('generate-all-row').style.display = 'none';
    document.getElementById('synth-settings').style.display = 'none';
    document.getElementById('lang-bar').style.display = 'none';
    setReviewStatus('', '');
    // Apply global voice preference (no session yet — session ID available after scripts return)
    applyVoicePref(null);
  }

  function populateConspect(data) {
    pushSessionUrl(data.session_id);
    document.getElementById('session-badge').textContent = 'session ' + data.session_id;
    document.getElementById('session-title').value = data.title || '';
    document.getElementById('episodes-heading').textContent =
      `${data.episode_count} episode${data.episode_count !== 1 ? 's' : ''} — expanding…`;

    const opBox = document.getElementById('operator-msg-box');
    if (data.operator_message) { opBox.textContent = '⚠ ' + data.operator_message; opBox.style.display = 'block'; }
    else opBox.style.display = 'none';

    const list = document.getElementById('episode-list');
    list.innerHTML = '';
    data.episodes.forEach(ep => list.appendChild(buildEpisodeCard(ep)));
  }

  function buildEpisodeCard(ep) {
    const card = document.createElement('div');
    card.className = 'episode-card loading';
    card.id = `episode-card-${ep.index}`;
    card.innerHTML = `
      <div class="episode-header">
        <span class="episode-title">${escHtml(ep.title)}</span>
        <span class="episode-meta" id="meta-${ep.index}"><span class="spinner"></span></span>
      </div>
      <div class="episode-summary" id="summary-${ep.index}">${escHtml(ep.preview)}</div>
      <textarea class="script-area streaming" id="script-${ep.index}" rows="6"
        placeholder="Expanding…" readonly></textarea>
      <div class="episode-actions" id="actions-${ep.index}">
        <div class="actions-left"><span style="font-size:0.78rem; color:#555">Waiting…</span></div>
        <div class="actions-right" id="downloads-${ep.index}"></div>
      </div>
    `;
    return card;
  }

  async function expandAllSequentially(session_id, episodes) {
    for (const ep of episodes) {
      if (_expandCancelled) break;
      await streamExpand(session_id, ep.index);
    }
    const total = episodes.length;
    document.getElementById('episodes-heading').textContent =
      `${total} episode${total !== 1 ? 's' : ''} ready`;
    document.getElementById('generate-all-row').style.display = 'flex';
    document.getElementById('synth-settings').style.display = 'block';
    // Apply voice preference now that the settings panel is visible
    applyVoicePref(session_id);
    updateLangBar();
    setReviewStatus('', '');
  }

  async function streamExpand(session_id, index) {
    const scriptEl  = document.getElementById(`script-${index}`);
    const metaEl    = document.getElementById(`meta-${index}`);
    const actionsEl = document.getElementById(`actions-${index}`);
    const card      = document.getElementById(`episode-card-${index}`);

    scriptEl.style.display = 'block';
    scriptEl.classList.add('streaming');
    scriptEl.value = '';
    scriptEl.readOnly = true;
    actionsEl.querySelector('.actions-left').innerHTML =
      `<span style="font-size:0.78rem; color:#7ab8e8"><span class="spinner"></span> Expanding…</span>`;

    let text = '';
    try {
      const resp = await fetch(`/podcast/sessions/${session_id}/episodes/${index}/expand`, { method: 'POST' });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        setEpisodeError(index, session_id, err.detail ?? resp.statusText);
        metaEl.innerHTML = ''; return;
      }
      const reader  = resp.body.getReader();
      const decoder = new TextDecoder();
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        text += decoder.decode(value, { stream: true });
        scriptEl.value = text;
        scriptEl.scrollTop = scriptEl.scrollHeight;
      }

      saveEpisodeTextLocal(session_id, index, text);

      scriptEl.classList.remove('streaming');
      scriptEl.classList.add('expanded');
      scriptEl.readOnly = false;
      card.classList.remove('loading');
      metaEl.textContent = text.trim().split(/\s+/).length.toLocaleString() + ' words';
      wireEditAutoSave(session_id, index, 'en', scriptEl);
      setEpisodeReady(index, session_id);

    } catch (e) {
      setEpisodeError(index, session_id, e.message);
      metaEl.innerHTML = '';
    }
  }

  function wireEditAutoSave(session_id, index, lang, scriptEl) {
    let saveTimer = null;
    scriptEl.addEventListener('input', () => {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => saveEpisodeText(session_id, index, lang, scriptEl.value), 1000);
    });
  }

  function setEpisodeReady(index, session_id) {
    const actionsEl = document.getElementById(`actions-${index}`);
    actionsEl.querySelector('.actions-left').innerHTML = `
      <button class="btn btn-generate" id="gen-btn-${index}"
        onclick="synthesizeEpisode(${index}, this)">Generate MP3</button>
      <span class="save-indicator" id="save-ind-${index}">saved</span>
    `;
  }

  function setEpisodeError(index, session_id, msg) {
    const actionsEl = document.getElementById(`actions-${index}`);
    const card = document.getElementById(`episode-card-${index}`);
    if (card) card.classList.add('error-state');
    actionsEl.querySelector('.actions-left').innerHTML = `
      <span style="color:#e87a7a; font-size:0.78rem">${escHtml(msg)}</span>
      <button class="btn btn-retry btn-sm" onclick="retryExpand('${session_id}', ${index})">Retry expand</button>
    `;
  }

  async function retryExpand(session_id, index) {
    const card = document.getElementById(`episode-card-${index}`);
    if (card) { card.classList.remove('error-state'); card.classList.add('loading'); }
    await streamExpand(session_id, index);
  }

  async function saveEpisodeText(session_id, index, lang, text) {
    saveEpisodeTextLang(session_id, index, lang, text);
    try {
      await fetch(`/podcast/sessions/${session_id}/episodes/${index}/text`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
    } catch { /* silent — local save already done */ }
    const ind = document.getElementById(`save-ind-${index}`);
    if (ind) { ind.classList.add('visible'); setTimeout(() => ind.classList.remove('visible'), 2000); }
  }

  // ── Synthesize (async job) ──
  async function synthesizeEpisode(index, btnEl) {
    const scriptEl = document.getElementById(`script-${index}`);
    const textOverride = scriptEl?.value || undefined;
    if (!textOverride) {
      setReviewStatus(`Episode ${index}: no text available for ${_activeLanguage.toUpperCase()}.`, 'error');
      return;
    }
    const params = getSynthesisParams(textOverride);
    const origText = btnEl.textContent;
    btnEl.disabled = true; btnEl.textContent = 'Queuing…';
    setReviewStatus('', '');

    try {
      const resp = await fetch(
        `/podcast/sessions/${currentSession.session_id}/episodes/${index}/synthesize`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(params) }
      );
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        setReviewStatus(`Episode ${index}: ` + (err.detail ?? resp.statusText), 'error');
        btnEl.disabled = false; btnEl.textContent = origText; return;
      }
      const { job_id } = await resp.json();
      btnEl.textContent = 'Generating…';
      await pollJob(job_id, index, btnEl, _activeLanguage);
    } catch (e) {
      setReviewStatus('Network error: ' + e.message, 'error');
      btnEl.disabled = false; btnEl.textContent = origText;
    }
  }

  async function pollJob(job_id, episode_index, btnEl, language) {
    const langLabel = LANG_NAMES[language] || language.toUpperCase();
    while (true) {
      await new Promise(r => setTimeout(r, 3000));
      try {
        const resp = await fetch(`/podcast/jobs/${job_id}`);
        if (!resp.ok) {
          setReviewStatus(`Job polling failed for episode ${episode_index}.`, 'error');
          btnEl.disabled = false; btnEl.textContent = 'Retry'; return;
        }
        const job = await resp.json();
        if (job.status === 'done') {
          const downloadsEl = document.getElementById(`downloads-${episode_index}`);
          if (downloadsEl) {
            const a = document.createElement('a');
            a.className = 'btn btn-download';
            a.href = `/podcast/jobs/${job_id}/download`;
            a.download = job.filename || `episode_${episode_index}.mp3`;
            a.textContent = `⬇ ${langLabel}`;
            downloadsEl.appendChild(a);
          }
          btnEl.disabled = false; btnEl.textContent = 'Generate MP3'; return;
        }
        if (job.status === 'failed') {
          setReviewStatus(`Episode ${episode_index} failed: ${job.error}`, 'error');
          btnEl.disabled = false; btnEl.textContent = 'Retry'; return;
        }
      } catch (e) {
        setReviewStatus('Polling error: ' + e.message, 'error');
        btnEl.disabled = false; btnEl.textContent = 'Retry'; return;
      }
    }
  }

  // ── Generate all ──
  document.getElementById('generate-all-btn').addEventListener('click', async () => {
    const btn = document.getElementById('generate-all-btn');
    btn.disabled = true;
    _generateAllCancelled = false;
    const cancelBtn = document.getElementById('cancel-expand-btn');
    cancelBtn.style.display = '';
    cancelBtn.onclick = () => { _generateAllCancelled = true; cancelBtn.style.display = 'none'; };

    let completed = 0;
    for (const ep of currentSession.episodes) {
      if (_generateAllCancelled) break;
      const genBtn = document.getElementById(`gen-btn-${ep.index}`);
      if (!genBtn || genBtn.disabled) continue;

      const scriptEl = document.getElementById(`script-${ep.index}`);
      const textOverride = scriptEl?.value || undefined;
      if (!textOverride) continue; // no text for this language

      btn.textContent = `Generating ${ep.index}/${currentSession.episodes.length}…`;
      const params = getSynthesisParams(textOverride);
      genBtn.disabled = true; genBtn.textContent = 'Generating…';

      try {
        const resp = await fetch(
          `/podcast/sessions/${currentSession.session_id}/episodes/${ep.index}/synthesize`,
          { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(params) }
        );
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          setReviewStatus(`Episode ${ep.index}: ` + (err.detail ?? resp.statusText), 'error');
          genBtn.disabled = false; genBtn.textContent = 'Generate MP3'; break;
        }
        const { job_id } = await resp.json();
        await pollJob(job_id, ep.index, genBtn, _activeLanguage);
        completed++;
      } catch (e) {
        setReviewStatus('Network error: ' + e.message, 'error');
        genBtn.disabled = false; genBtn.textContent = 'Generate MP3'; break;
      }
    }

    cancelBtn.style.display = 'none';
    btn.disabled = false;
    btn.textContent = completed > 0
      ? `Done — ${completed} episode${completed !== 1 ? 's' : ''} generated`
      : 'Generate all episodes';
  });

  // ── New session ──
  document.getElementById('new-session-btn').addEventListener('click', () => {
    _expandCancelled = true;
    _generateAllCancelled = true;
    if (_conspectController) { _conspectController.abort(); _conspectController = null; }
    currentSession = null;
    clearSessionUrl();
    document.getElementById('review').style.display = 'none';
    document.getElementById('input-step').style.display = 'block';
    setInputStatus('', '');
    renderHistory();
  });

  // ── Show review for saved session ──
  function showReview(data) {
    pushSessionUrl(data.session_id);
    _activeLanguage = 'en';
    document.getElementById('input-step').style.display = 'none';
    document.getElementById('review').style.display = 'block';
    document.getElementById('session-badge').textContent = 'session ' + data.session_id;
    const title = data.title || '';
    document.getElementById('session-title').value = title;
    document.title = (title || 'Untitled') + ' — Spodkast';
    document.getElementById('cancel-expand-btn').style.display = 'none';

    const opBox = document.getElementById('operator-msg-box');
    if (data.operator_message) { opBox.textContent = '⚠ ' + data.operator_message; opBox.style.display = 'block'; }
    else opBox.style.display = 'none';

    const list = document.getElementById('episode-list');
    list.innerHTML = '';
    const missingExpansion = [];

    data.episodes.forEach(ep => {
      const localText = loadEpisodeTextLocal(data.session_id, ep.index);
      const hasText = !!localText;

      const card = document.createElement('div');
      card.className = 'episode-card';
      card.id = `episode-card-${ep.index}`;
      const words = hasText ? localText.trim().split(/\s+/).length.toLocaleString() + ' words' : '';
      card.innerHTML = `
        <div class="episode-header">
          <span class="episode-title">${escHtml(ep.title || 'Episode ' + ep.index)}</span>
          <span class="episode-meta" id="meta-${ep.index}">${words}</span>
        </div>
        <textarea class="script-area${hasText ? ' expanded' : ''}" id="script-${ep.index}"
          rows="6" ${hasText ? '' : 'placeholder="Not yet expanded" readonly'}
        >${escHtml(hasText ? localText : '')}</textarea>
        <div class="episode-actions" id="actions-${ep.index}">
          <div class="actions-left">
            ${hasText
              ? `<button class="btn btn-generate" id="gen-btn-${ep.index}"
                   onclick="synthesizeEpisode(${ep.index}, this)">Generate MP3</button>
                 <span class="save-indicator" id="save-ind-${ep.index}">saved</span>`
              : `<span style="color:#555; font-size:0.78rem" id="pending-${ep.index}">Not yet expanded</span>`
            }
          </div>
          <div class="actions-right" id="downloads-${ep.index}"></div>
        </div>
      `;
      list.appendChild(card);

      if (hasText) {
        const scriptEl = document.getElementById(`script-${ep.index}`);
        scriptEl.style.display = 'block';
        wireEditAutoSave(data.session_id, ep.index, 'en', scriptEl);
      } else {
        missingExpansion.push(ep.index);
      }
    });

    const total = data.episode_count;
    const ready = total - missingExpansion.length;
    document.getElementById('episodes-heading').textContent =
      missingExpansion.length === 0
        ? `${total} episode${total !== 1 ? 's' : ''} ready`
        : `${ready}/${total} episodes expanded`;

    document.getElementById('synth-settings').style.display = 'block';
    document.getElementById('generate-all-row').style.display = 'flex';
    // Restore saved voice preference for this session
    applyVoicePref(data.session_id);
    updateLangBar();

    if (missingExpansion.length > 0) {
      const resumeBtn = document.createElement('button');
      resumeBtn.className = 'btn btn-secondary btn-sm';
      resumeBtn.id = 'resume-btn';
      resumeBtn.textContent = `Resume (${missingExpansion.length} remaining)`;
      resumeBtn.addEventListener('click', async () => {
        resumeBtn.remove();
        _expandCancelled = false;
        document.getElementById('cancel-expand-btn').style.display = '';
        missingExpansion.forEach(idx => {
          const scriptEl = document.getElementById(`script-${idx}`);
          if (scriptEl) { scriptEl.style.display = 'block'; scriptEl.classList.add('streaming'); }
          const pendingEl = document.getElementById(`pending-${idx}`);
          if (pendingEl) pendingEl.innerHTML = `<span class="spinner"></span> Waiting…`;
        });
        for (const idx of missingExpansion) {
          if (_expandCancelled) break;
          await streamExpand(data.session_id, idx);
        }
        document.getElementById('cancel-expand-btn').style.display = 'none';
        const stillMissing = missingExpansion.filter(idx => !loadEpisodeTextLocal(data.session_id, idx)).length;
        document.getElementById('episodes-heading').textContent =
          stillMissing === 0 ? `${total} episode${total !== 1 ? 's' : ''} ready` : `${total - stillMissing}/${total} expanded`;
        updateLangBar();
      });
      document.querySelector('.review-toolbar').appendChild(resumeBtn);
    }
    setReviewStatus('', '');
  }

  // ── Session title ──
  document.getElementById('session-title').addEventListener('input', () => {
    if (!currentSession) return;
    const title = document.getElementById('session-title').value;
    const all = loadSavedSessions().map(s =>
      s.session_id === currentSession.session_id ? { ...s, title } : s
    );
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(all));
    currentSession.title = title;
    document.title = (title || 'Untitled') + ' — Spodkast';
  });

  // ── URL sync ──
  function pushSessionUrl(session_id) { history.pushState({ session_id }, '', '?s=' + session_id); }
  function clearSessionUrl() { history.pushState({}, '', '/'); document.title = 'Spodkast'; }

  window.addEventListener('popstate', e => {
    const id = e.state?.session_id;
    if (id) {
      const saved = loadSavedSessions().find(s => s.session_id === id);
      if (saved) { currentSession = saved; showReview(saved); }
    } else {
      currentSession = null;
      document.getElementById('review').style.display = 'none';
      document.getElementById('input-step').style.display = 'block';
      renderHistory();
    }
  });

  // ── History ──
  function deleteSession(session_id, e) {
    e.stopPropagation();
    const all = loadSavedSessions().filter(s => s.session_id !== session_id);
    localStorage.setItem(SESSIONS_KEY, JSON.stringify(all));
    renderHistory();
  }

  function renderHistory() {
    const all     = loadSavedSessions();
    const section = document.getElementById('history-section');
    const hlist   = document.getElementById('history-list');
    if (!all.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    hlist.innerHTML = '';
    all.forEach(s => {
      const item = document.createElement('div');
      item.className = 'history-item';
      const date  = new Date(s.saved_at).toLocaleString();
      const label = s.title ? escHtml(s.title) : `<span class="hi-id">${s.session_id}</span>`;
      item.innerHTML = `
        <span>${label} <span style="color:#444">— ${s.episode_count} ep${s.episode_count !== 1 ? 's' : ''}</span></span>
        <span style="display:flex; align-items:center; gap:0.6rem;">
          <span class="hi-meta">${date}</span>
          <button class="btn btn-danger btn-sm" style="padding:0.2rem 0.5rem; font-size:0.72rem;"
            onclick="deleteSession('${s.session_id}', event)">✕</button>
        </span>
      `;
      item.addEventListener('click', () => { currentSession = s; showReview(s); });
      hlist.appendChild(item);
    });
  }

  window.addEventListener('DOMContentLoaded', () => {
    renderHistory();
    const id = new URLSearchParams(location.search).get('s');
    if (id) {
      const saved = loadSavedSessions().find(s => s.session_id === id);
      if (saved) { currentSession = saved; showReview(saved); }
      else history.replaceState({}, '', '/');
    } else {
      // Preload global voice preference so it's ready if the user starts a new session
      applyVoicePref(null);
    }
  });

  function escHtml(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
